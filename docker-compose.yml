version: "3.8"

services:
  # Run CLI simulation: docker compose run cli /data/input.json /data/output.json
  cli:
    build:
      context: .
      target: backend
    volumes:
      - ./:/data
    profiles:
      - cli

  # Frontend dev server on http://localhost:3000
  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "3000:80"
